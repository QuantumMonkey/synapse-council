<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synapse Council - Security Gateway</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .gateway-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }
    .gateway-card {
      width: 500px;
      padding: 32px;
      background: var(--bg-panel);
      border-radius: 16px;
      border: 1px solid var(--border-glass);
      box-shadow: var(--shadow-panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .gateway-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .gateway-header h2 {
      font-family: var(--font-logo);
      color: var(--accent-cyan);
      letter-spacing: 2px;
      font-size: 1.8rem;
    }
    .gateway-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 8px;
    }
    .key-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }
    .key-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .key-item label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      justify-content: space-between;
    }
    .key-item label span.status {
      font-size: 0.75rem;
      color: var(--accent-mint);
      display: none;
    }
    .key-item input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      background-color: var(--bg-input);
      border: 1px solid var(--border-glass);
      color: var(--text-primary);
      font-family: var(--font-code);
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }
    .key-item input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 3px rgba(0, 242, 254, 0.15);
    }
    .gateway-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .security-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .security-note svg {
      width: 14px;
      height: 14px;
      fill: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="gateway-container">
    <div class="gateway-card">
      <div class="gateway-header">
        <h2>SECURITY GATEWAY</h2>
        <p>Enter your API credentials to initialize the Synapse Council.</p>
      </div>

      <div class="key-list">
        <div class="key-item">
          <label>Gemini API Key 1 <span class="status" id="status-gemini1">✓ Encrypted</span></label>
          <input type="password" id="key-gemini1" placeholder="AIzaSy...">
        </div>
        <div class="key-item">
          <label>Gemini API Key 2 (Moderator) <span class="status" id="status-gemini2">✓ Encrypted</span></label>
          <input type="password" id="key-gemini2" placeholder="AIzaSy...">
        </div>
        <div class="key-item">
          <label>Groq API Key <span class="status" id="status-groq">✓ Encrypted</span></label>
          <input type="password" id="key-groq" placeholder="gsk_...">
        </div>
        <div class="key-item">
          <label>OpenRouter API Key <span class="status" id="status-openrouter">✓ Encrypted</span></label>
          <input type="password" id="key-openrouter" placeholder="sk-or-v1-...">
        </div>
      </div>

      <div class="gateway-actions">
        <div class="security-note">
          <svg viewBox="0 0 24 24"><path d="M12 2C9.24 2 7 4.24 7 7V9H5.5C4.67 9 4 9.67 4 10.5V20.5C4 21.33 4.67 22 5.5 22H18.5C19.33 22 20 21.33 20 20.5V10.5C20 9.67 19.33 9 18.5 9H17V7C17 4.24 14.76 2 12 2M12 4C13.66 4 15 5.34 15 7V9H9V7C9 5.34 10.34 4 12 4M12 14C13.11 14 14 14.9 14 16C14 17.11 13.11 18 12 18C10.9 18 10 17.11 10 16C10 14.9 10.9 14 12 14Z"/></svg>
          OS-Level Enclave Encryption
        </div>
        <button id="btn-unlock" class="primary-btn">Unlock Council</button>
      </div>
    </div>
  </div>

  <script>
    // Logic for saving keys
    document.getElementById('btn-unlock').addEventListener('click', async () => {
      const keys = {
        gemini1: document.getElementById('key-gemini1').value,
        gemini2: document.getElementById('key-gemini2').value,
        groq: document.getElementById('key-groq').value,
        openrouter: document.getElementById('key-openrouter').value
      };
      
      const btn = document.getElementById('btn-unlock');
      btn.innerText = 'Encrypting...';

      // Mock Tauri IPC call to secure storage
      // In Tauri: await window.__TAURI__.invoke('store_keys', { keys });
      setTimeout(() => {
        // Mark as encrypted in UI (mocking)
        Object.keys(keys).forEach(k => {
          if (keys[k]) {
            document.getElementById(`status-${k}`).style.display = 'inline';
            localStorage.setItem(`MOCK_ENC_KEY_${k}`, keys[k]); // strictly for mocking until Tauri is built
          }
        });
        
        btn.innerText = 'Enter Arena';
        btn.onclick = () => { window.location.href = 'index.html'; };
      }, 800);
    });

    // On load, mock load if exists
    window.addEventListener('DOMContentLoaded', () => {
      const keys = ['gemini1', 'gemini2', 'groq', 'openrouter'];
      keys.forEach(k => {
        if (localStorage.getItem(`MOCK_ENC_KEY_${k}`)) {
           document.getElementById(`key-${k}`).value = '********'; // hide real key in UI
           document.getElementById(`status-${k}`).style.display = 'inline';
        }
      });
    });
  </script>
</body>
</html>

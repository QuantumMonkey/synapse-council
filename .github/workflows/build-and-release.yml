name: Build and Release (Desktop & Mobile)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-tauri:
    name: Build Desktop (Tauri)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: 'v0.1.0-alpha-${{ github.run_number }}'
          releaseName: 'Synapse Council v0.1.0-alpha (Build ${{ github.run_number }})'
          releaseBody: 'Automated CI/CD build of Synapse Council.'
          releaseDraft: false
          prerelease: true
          args: ''

  build-capacitor:
    name: Build Android (Capacitor)
    runs-on: ubuntu-latest
    needs: build-tauri # Wait for Tauri to create the release so we can upload the APK to the same release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: 'v0.1.0-alpha-${{ github.run_number }}'
          files: android/app/build/outputs/apk/debug/app-debug.apk
